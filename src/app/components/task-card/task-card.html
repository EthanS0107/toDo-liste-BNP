@let t = task();
@let cat = category();
@let overdue = t.dueDate | isOverdue: t.status;
<div [class.overdue]="overdue">
  <!-- En-tête : Titre et Priorité -->
  <div>
    <h3 [class.done]="t.status === 'done'">
      {{ t.title }}
    </h3>
    <app-priority-badge [priority]="t.priority"></app-priority-badge>
  </div>

  <!-- Description -->
  <p>
    {{ t.description }}
  </p>

  <!-- Méta-informations : Catégorie, Date, Statut -->
  <div>
    <!-- Statut (Badge) -->
    <app-status-badge [status]="t.status"></app-status-badge>

    <!-- Catégorie -->
    @if (cat) {
      <app-category-chip [category]="cat"></app-category-chip>
    }

    <!-- Date d'échéance (relative / overdue) -->
    @if (t.dueDate) {
      <app-due-date [date]="t.dueDate" [overdue]="overdue"></app-due-date>
    }
  </div>

  <div>
    <app-task-actions
      [status]="t.status"
      (markDone)="statusChanged.emit({ id: t.id, status: 'done' })"
      (reopen)="statusChanged.emit({ id: t.id, status: 'todo' })"
      (start)="statusChanged.emit({ id: t.id, status: 'in-progress' })"
      (edit)="edited.emit(t)"
      (delete)="deleted.emit(t.id)"
    ></app-task-actions>
  </div>
</div>
