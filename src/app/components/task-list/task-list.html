<!-- On boucle sur chaque tâche avec la nouvelle syntaxe Angular -->
@for (task of tasks(); track task.id) {
  <app-task-card
    [task]="task"
    (deleted)="taskDeleted.emit($event)"
    (edited)="taskEdited.emit($event)"
    (statusChanged)="taskStatusChanged.emit($event)"
  />
} @empty {
  <!-- Si la liste est vide, on affiche ce message -->
  <p>Aucune tâche pour le moment.</p>
}
