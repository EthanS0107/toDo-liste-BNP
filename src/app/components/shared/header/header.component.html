<header class="main-header">
  <div class="header-container">
    <a class="logo" routerLink="/">
      <img src="/logo-bnp.jpg" alt="Logo BNP Paribas" />
    </a>

    <nav class="nav-menu">
      <a routerLink="/tasks" routerLinkActive="active" class="nav-link">
        Mes Tâches
        @if (taskService.tasks().length > 0) {
          <span class="badge">{{ taskService.tasks().length }}</span>
        }
      </a>
      <button
        (click)="themeService.toggleTheme()"
        class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
        [title]="themeService.isDarkMode() ? 'Passer au clair' : 'Passer au sombre'"
      >
        @if (themeService.isDarkMode()) {
          <span role="img" aria-label="soleil">mode claire</span>
        } @else {
          <span role="img" aria-label="lune">mode sombre</span>
        }
      </button>
      <app-button variant="primary" routerLink="/tasks/new">+ Nouvelle tâche</app-button>
    </nav>
  </div>
</header>
