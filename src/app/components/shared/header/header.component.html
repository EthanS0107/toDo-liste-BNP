<header class="main-header">
  <div class="header-container">
    <div class="header-content">
      <div class="header-logo">
        <img src="/bnp-icon.webp" alt="BNP Paribas" />
        <div>
          <div class="header-title">Espace collaborateur</div>
          <div class="header-user">Nom Prénom · Agence Montreuil Valmy</div>
        </div>
      </div>
      <div class="header-actions" style="display: flex; gap: 4px">
        <button class="header-action">
          <img src="/icons/search.svg" alt="Search" />
        </button>
        <button class="header-action">
          <img src="/icons/notifications.svg" alt="Notifications" />
        </button>
        <button
          class="header-action"
          (click)="themeService.toggleTheme()"
          [title]="themeService.isDarkMode() ? 'Passer au clair' : 'Passer au sombre'"
        >
          @if (themeService.isDarkMode()) {
            <span role="img" aria-label="soleil" style="display: flex">
              <img src="/icons/mode-light.svg" alt="Soleil" />
            </span>
          } @else {
            <span role="img" aria-label="lune" style="display: flex">
              <img src="/icons/mode-night.svg" alt="Lune" />
            </span>
          }
        </button>
      </div>
    </div>
  </div>
</header>
