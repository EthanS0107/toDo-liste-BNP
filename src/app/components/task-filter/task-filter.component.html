<div class="filter-container">
  <div class="filter-row priority-row">
    <span class="filter-label">Priorité</span>
    <div class="filter-buttons">
      <button
        type="button"
        class="chip"
        [class.active]="priority() === null"
        (click)="selectPriority(null)"
      >
        TOUTES
      </button>
      @for (p of priorityOptions; track p.id) {
        <button
          type="button"
          class="chip"
          [class.active]="priority() === p.id"
          (click)="selectPriority(p.id)"
        >
          {{ p.label }}
        </button>
      }
    </div>
  </div>

  <div class="sort-segment">
    <span class="sort-label">Tri</span>
    @for (s of sortOptions; track s.id) {
      <button
        type="button"
        class="segment-btn"
        [class.active]="sortBy() === s.id"
        (click)="selectSort(s.id)"
      >
        {{ s.label }}
      </button>
    }
  </div>
</div>
