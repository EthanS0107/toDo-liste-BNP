<div class="filter-container">
  <!-- Section Recherche -->
  <div class="search-section">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        type="text"
        #searchInput
        [ngModel]="search()"
        (ngModelChange)="search.set($event)"
        placeholder="Rechercher une tâche..."
        class="search-input"
      />
      @if (search()) {
        <button class="clear-btn" (click)="search.set('')" title="Effacer la recherche">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      }
    </div>
  </div>

  <!-- Grille de filtres -->
  <div class="filters-grid">
    <app-form-field label="Statut">
      <app-status-filter
        [selected]="status()"
        (selectedChange)="status.set($event)"
      />
    </app-form-field>

    <div class="select-filters">
      <app-form-field label="Catégorie">
        <select [ngModel]="categoryId()" (ngModelChange)="categoryId.set($event || null)">
          <option [value]="null">Toutes les catégories</option>
          @for (cat of categories(); track cat.id) {
            <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </app-form-field>

      <app-form-field label="Priorité">
        <select [ngModel]="priority()" (ngModelChange)="priority.set($event || null)">
          <option [value]="null">Toutes les priorités</option>
          @for (p of priorities(); track p.id) {
            <option [value]="p.id">{{ p.name }}</option>
          }
        </select>
      </app-form-field>

      <app-form-field label="Trier par">
        <select [ngModel]="sortBy()" (ngModelChange)="sortBy.set($event)">
          <option value="date">Date de création</option>
          <option value="priority">Priorité</option>
          <option value="title">Titre</option>
        </select>
      </app-form-field>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <app-button variant="ghost" size="sm" (click)="resetFilters()">
      <svg class="reset-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
      </svg>
      Réinitialiser les filtres
    </app-button>
  </div>
</div>
